name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: scapedle/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: scapedle

      - name: Run tests
        run: npm test -- --watchAll=false --ci
        working-directory: scapedle
